services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: smartark
      MYSQL_USER: smartark
      MYSQL_PASSWORD: smartark
      TZ: UTC
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.4
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  qdrant:
    image: qdrant/qdrant:v1.12.6
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  langchain-runtime:
    build:
      context: ./services/langchain-runtime
    env_file:
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "18080:18080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:18080/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 10

  api-gateway:
    build:
      context: ./services/api-gateway-java
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/smartark?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      REDIS_HOST: redis
      QDRANT_HOST: qdrant
      QDRANT_GRPC_PORT: 6334
      LANGCHAIN_SIDECAR_BASE_URL: http://langchain-runtime:18080
      LANGCHAIN_RUNTIME_BASE_URL: http://langchain-runtime:18080
      PREVIEW_DOCKER_HOST: unix:///var/run/docker.sock
      AGENT_DEEPAGENT_CALLBACK_BASE_URL: http://api-gateway:8080
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/smartark:/tmp/smartark
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      langchain-runtime:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend-web/Dockerfile
    ports:
      - "80:80"
    depends_on:
      api-gateway:
        condition: service_healthy

volumes:
  qdrant_data:
  mysql_data:
