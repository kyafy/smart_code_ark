services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: smartark
      MYSQL_USER: smartark
      MYSQL_PASSWORD: smartark
      TZ: UTC
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.4
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  api-gateway:
    build:
      context: ./services/api-gateway-java
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: smartark
      DB_USER: smartark
      DB_PASSWORD: smartark
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MODEL_BASE_URL: ${MODEL_BASE_URL:-}
      MODEL_API_KEY: ${MODEL_API_KEY:-}
      MODEL_MOCK_ENABLED: ${MODEL_MOCK_ENABLED:-true}
      CHAT_MODEL: ${CHAT_MODEL:-Qwen3.5-Plus}
      CODE_MODEL: ${CODE_MODEL:-qwen-plus}
      TZ: UTC
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
