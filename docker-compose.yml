services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: smartark
      MYSQL_USER: smartark
      MYSQL_PASSWORD: smartark
      TZ: UTC
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.4
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  qdrant:
    image: qdrant/qdrant:v1.12.6
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  langchain-runtime:
    build:
      context: ./services/langchain-runtime
    environment:
      LANGCHAIN_RUNTIME_API_VERSION: ${LANGCHAIN_SIDECAR_API_VERSION:-v1}
      LANGCHAIN_MODEL_BASE_URL: ${MODEL_BASE_URL:-}
      LANGCHAIN_MODEL_API_KEY: ${MODEL_API_KEY:-}
      LANGCHAIN_MODEL_NAME: ${LANGCHAIN_MODEL_NAME:-}
      LANGCHAIN_DEFAULT_CHAT_MODEL: ${CHAT_MODEL:-qwen-plus}
      LANGCHAIN_DEFAULT_EMBEDDING_MODEL: ${RAG_EMBEDDING_MODEL:-text-embedding-v3}
      LANGCHAIN_ENABLE_LANGSMITH: ${LANGCHAIN_ENABLE_LANGSMITH:-false}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-smartark-langchain-runtime}
      DEEPAGENT_CALLBACK_TIMEOUT: ${DEEPAGENT_CALLBACK_TIMEOUT:-120}
      # Phase 1-3: LLM direct-call settings
      DEEPAGENT_LLM_DIRECT_ENABLED: ${DEEPAGENT_LLM_DIRECT_ENABLED:-false}
      DEEPAGENT_LLM_CODEGEN_TIMEOUT: ${DEEPAGENT_LLM_CODEGEN_TIMEOUT:-90}
      DEEPAGENT_LLM_CONCURRENCY: ${DEEPAGENT_LLM_CONCURRENCY:-5}
      DEEPAGENT_PLAN_MAX_FILES: ${DEEPAGENT_PLAN_MAX_FILES:-260}
      DEEPAGENT_DOCKER_HOST: ${DEEPAGENT_DOCKER_HOST:-unix:///var/run/docker.sock}
      # Iteration limits — simple tasks (file_count <= threshold)
      DEEPAGENT_MAX_BUILD_FIX_ROUNDS: ${DEEPAGENT_MAX_BUILD_FIX_ROUNDS:-3}
      DEEPAGENT_MAX_SMOKE_FIX_ROUNDS: ${DEEPAGENT_MAX_SMOKE_FIX_ROUNDS:-2}
      DEEPAGENT_MAX_TOTAL_FIX_ROUNDS: ${DEEPAGENT_MAX_TOTAL_FIX_ROUNDS:-4}
      # Iteration limits — complex tasks (file_count > threshold)
      DEEPAGENT_MAX_BUILD_FIX_ROUNDS_COMPLEX: ${DEEPAGENT_MAX_BUILD_FIX_ROUNDS_COMPLEX:-5}
      DEEPAGENT_MAX_SMOKE_FIX_ROUNDS_COMPLEX: ${DEEPAGENT_MAX_SMOKE_FIX_ROUNDS_COMPLEX:-3}
      DEEPAGENT_MAX_TOTAL_FIX_ROUNDS_COMPLEX: ${DEEPAGENT_MAX_TOTAL_FIX_ROUNDS_COMPLEX:-7}
      DEEPAGENT_COMPLEXITY_FILE_THRESHOLD: ${DEEPAGENT_COMPLEXITY_FILE_THRESHOLD:-50}
      # Per-node model overrides (leave empty to use global default)
      DEEPAGENT_NODE_MODEL_REQUIREMENT_ANALYZE: ${DEEPAGENT_NODE_MODEL_REQUIREMENT_ANALYZE:-}
      DEEPAGENT_NODE_MODEL_BUILD_FIX: ${DEEPAGENT_NODE_MODEL_BUILD_FIX:-}
      DEEPAGENT_NODE_MODEL_CODEGEN_BACKEND: ${DEEPAGENT_NODE_MODEL_CODEGEN_BACKEND:-}
      DEEPAGENT_NODE_MODEL_CODEGEN_FRONTEND: ${DEEPAGENT_NODE_MODEL_CODEGEN_FRONTEND:-}
      DEEPAGENT_NODE_MODEL_SQL_GENERATE: ${DEEPAGENT_NODE_MODEL_SQL_GENERATE:-}
      DEEPAGENT_MODEL_STRONG_NAME: ${DEEPAGENT_MODEL_STRONG_NAME:-}
      DEEPAGENT_MODEL_FAST_NAME: ${DEEPAGENT_MODEL_FAST_NAME:-}
      TZ: UTC
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "18080:18080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:18080/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 10

  api-gateway:
    build:
      context: ./services/api-gateway-java
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: smartark
      DB_USER: smartark
      DB_PASSWORD: smartark
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/smartark?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: smartark
      SPRING_DATASOURCE_PASSWORD: smartark
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MODEL_BASE_URL: ${MODEL_BASE_URL:-}
      MODEL_API_KEY: ${MODEL_API_KEY:-}
      MODEL_MOCK_ENABLED: ${MODEL_MOCK_ENABLED:-true}
      CHAT_MODEL: ${CHAT_MODEL:-Qwen3.5-Plus}
      CODE_MODEL: ${CODE_MODEL:-qwen-plus}
      QDRANT_HOST: qdrant
      QDRANT_GRPC_PORT: 6334
      RAG_ENABLED: ${RAG_ENABLED:-true}
      RAG_EMBEDDING_MODEL: ${RAG_EMBEDDING_MODEL:-text-embedding-v3}
      RAG_EMBEDDING_DIMENSION: ${RAG_EMBEDDING_DIMENSION:-1024}
      LANGCHAIN_ENABLED: ${LANGCHAIN_ENABLED:-false}
      LANGCHAIN_SIDECAR_BASE_URL: ${LANGCHAIN_SIDECAR_BASE_URL:-http://langchain-runtime:18080}
      LANGCHAIN_SIDECAR_TIMEOUT_MS: ${LANGCHAIN_SIDECAR_TIMEOUT_MS:-3000}
      LANGCHAIN_SIDECAR_API_VERSION: ${LANGCHAIN_SIDECAR_API_VERSION:-v1}
      LANGCHAIN_RUNTIME_MODEL_ENABLED: ${LANGCHAIN_RUNTIME_MODEL_ENABLED:-false}
      LANGCHAIN_RUNTIME_BASE_URL: ${LANGCHAIN_RUNTIME_BASE_URL:-http://langchain-runtime:18080}
      LANGCHAIN_RUNTIME_TIMEOUT_MS: ${LANGCHAIN_RUNTIME_TIMEOUT_MS:-600000}
      LANGCHAIN_RUNTIME_CODEGEN_GRAPH_ENABLED: ${LANGCHAIN_RUNTIME_CODEGEN_GRAPH_ENABLED:-false}
      LANGCHAIN_RUNTIME_PAPER_GRAPH_ENABLED: ${LANGCHAIN_RUNTIME_PAPER_GRAPH_ENABLED:-false}
      CROSSREF_MAILTO: ${CROSSREF_MAILTO:-aicfu71@gmail.com}
      PREVIEW_ENABLED: ${PREVIEW_ENABLED:-true}
      PREVIEW_DOCKER_HOST: unix:///var/run/docker.sock
      TZ: UTC
    ports:
      - "8080:8080"
      - "30000-30100:30000-30100"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/smartark:/tmp/smartark
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      langchain-runtime:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend-web/Dockerfile
    ports:
      - "80:80"
    depends_on:
      api-gateway:
        condition: service_healthy

volumes:
  qdrant_data:
