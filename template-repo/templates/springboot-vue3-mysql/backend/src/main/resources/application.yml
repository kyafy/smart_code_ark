server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:app_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:app}
    password: ${DB_PASSWORD:app123456}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

ai:
  base-url: ${AI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
  api-key: ${AI_API_KEY:}
  model: ${AI_MODEL:qwen-plus}
  embedding-model: ${AI_EMBEDDING_MODEL:text-embedding-v3}
  timeout-seconds: ${AI_TIMEOUT_SECONDS:60}
  max-tokens: ${AI_MAX_TOKENS:4096}
  temperature: ${AI_TEMPERATURE:0.7}
